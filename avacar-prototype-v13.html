body{background:var(--bg);min-height:100dvh;font-family:'Manrope',sans-serif;padding:0;margin:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes progressBar{from{width:0}to{width:100%}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--primary-alpha-15)}50%{box-shadow:0 0 40px var(--primary-alpha-30)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes bounce{0%{transform:scale(1)}50%{transform:scale(.92)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-375px 0}100%{background-position:375px 0}}
.cx{max-width:400px;margin:0 auto;width:100%}
.feed-card{background:var(--surface-card);border:none;border-radius:16px;overflow:hidden;margin-bottom:16px;cursor:pointer;transition:all .2s cubic-bezier(0.4,0,0.2,1)}

.feed-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.feed-avatar{width:36px;height:36px;border-radius:18px;background:var(--surface-low);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary);flex-shrink:0}
.feed-body{padding:0 16px 14px}
.feed-actions{display:flex;align-items:center;gap:16px;padding:10px 16px}
.feed-action{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);cursor:pointer;transition:color .15s;background:none;border:none;padding:0;font-family:Manrope,sans-serif}
.feed-action:hover{color:var(--on-surface)}
.feed-action.liked{color:var(--error)}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom, 0px) + 80px);left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:28px;background:var(--accent,#007FFF);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,127,255,.35);z-index:30;border:none;transition:transform .15s}
.fab:hover{transform:translateX(-50%) scale(1.08)}
.fab:active{transform:translateX(-50%) scale(.95)}
.comment-row{display:flex;gap:10px;padding:12px 0}
.comment-avatar{width:28px;height:28px;border-radius:14px;background:var(--surface-low);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--on-surface-variant);flex-shrink:0}
.cust-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.cust-top{flex-shrink:0}
.cust-body{flex:1;overflow-y:auto;overflow-x:hidden}.cust-body::-webkit-scrollbar{width:0;display:none}
@media(min-width:768px){.feed-hero-wrap{height:200px}.cust-layout{flex-direction:row;gap:1px;background:var(--surface-container)}.cust-top{flex:0 0 45%;position:sticky;top:0;display:flex;flex-direction:column;overflow-y:auto;max-height:100dvh;background:var(--bg)}.cust-top .cust-img{flex-shrink:0}.cust-top .cust-img img{width:100%;height:auto;display:block}.cust-body{flex:1;overflow-y:auto;background:var(--bg)}}
.px{padding:20px;max-width:480px;margin:0 auto}

@keyframes ringOuter{to{transform:rotate(360deg)}}
@keyframes ringInner{to{transform:rotate(-360deg)}}
@keyframes carPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ring-outer{position:absolute;inset:0;border-radius:50%;padding:3px;background:conic-gradient(from 0deg,var(--primary),var(--success) 40%,transparent 70%,transparent);animation:ringOuter 2s linear infinite}
.ring-inner{position:absolute;inset:8px;border-radius:50%;padding:1.5px;background:conic-gradient(from 180deg,transparent,var(--primary-alpha-30) 50%,transparent);animation:ringInner 3.5s linear infinite}
.ring-bg{width:100%;height:100%;border-radius:50%;background:var(--bg)}
.phone{width:100%;max-width:700px;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;margin:0 auto;overflow:hidden}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.screen>.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.anim{animation:fadeIn .2s ease;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden}.scroll::-webkit-scrollbar{width:0;display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--topbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:none;flex-shrink:0;max-width:700px;margin:0 auto;width:100%;z-index:10;position:relative}
.topbar-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:900;font-style:italic;color:var(--on-surface);letter-spacing:-0.02em}
.tbb{cursor:pointer;color:var(--muted);background:none;border:none;padding:6px 8px;border-radius:10px;transition:all .15s;display:flex;align-items:center;justify-content:center;width:36px;height:36px}
.tbb:hover{color:var(--primary);background:var(--primary-alpha-06)}
.tabbar{display:flex;justify-content:space-around;align-items:center;padding:10px 8px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--tabbar-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:var(--divider);flex-shrink:0;max-width:700px;margin:0 auto;width:100%}
.tab{cursor:pointer;text-align:center;flex:1;padding:4px 0;transition:all .15s}
.tab:hover .ti svg,.tab:hover .tl{stroke:var(--primary);color:var(--primary)}
.ti{display:flex;align-items:center;justify-content:center;height:22px}
.ti svg{width:22px;height:22px;stroke:var(--muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tl{font-family:Manrope,sans-serif;font-size:10px;margin-top:4px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.tab.active .ti svg{stroke:var(--primary)}.tab.active .tl{color:var(--primary)}
.btn{border-radius:100px;padding:15px 24px;text-align:center;font-size:15px;font-weight:700;cursor:pointer;border:none;width:100%;font-family:'Manrope',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{opacity:.88}.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary-gradient);color:var(--btn-primary-text)}.btn-primary:hover{opacity:.92}
.btn-secondary{background:var(--surface-low);color:var(--on-surface);border:none}.btn-secondary:hover{background:var(--surface-container)}
.btn-dark{background:var(--btn-dark-bg);color:var(--btn-dark-color)}
.btn-outline{background:var(--surface-low);color:var(--on-surface);border:none}.btn-outline:hover{background:var(--surface-container);color:var(--primary)}
.btn-disabled{background:var(--primary-alpha-10);color:var(--primary);opacity:.4;cursor:not-allowed;border:none;pointer-events:none}
.btn-danger{background:var(--error-alpha-08);color:var(--error);border:none}
.box{border-radius:10px;display:flex;align-items:center;justify-content:center}
.chip{height:34px;border-radius:17px;padding:0 16px;display:inline-flex;align-items:center;font-size:12px;cursor:pointer;border:none;background:var(--chip-bg);color:var(--on-surface-variant);flex-shrink:0;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-alpha-04)}
.chip.active{background:var(--chip-active-bg);color:var(--chip-active-color);border-color:var(--chip-active-bg);font-weight:600}
.bta{padding:12px 20px 28px;border-top:var(--divider);background:var(--bg);flex-shrink:0;padding-bottom:max(28px,env(safe-area-inset-bottom));max-width:700px;margin:0 auto;width:100%}
.dot-active{width:24px;height:4px;border-radius:2px;background:var(--primary)}.dot{width:8px;height:4px;border-radius:2px;background:var(--outline-variant)}
.spinner{border:3px solid var(--surface-low);border-top:3px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite}
.pbar{height:4px;background:var(--surface-low);border-radius:2px;overflow:hidden;width:85%}.pfill{height:100%;background:var(--primary);border-radius:2px}
.shop-card{border:none;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s;background:var(--surface-card);box-shadow:var(--shadow-card)}
.shop-card:hover{box-shadow:var(--shadow-card-hover)}
.slot{height:46px;display:flex;align-items:center;justify-content:center;background:var(--surface-low);border-radius:12px;border:none;cursor:pointer;font-size:13px;color:var(--on-surface-variant);transition:all .15s;font-weight:500}
.slot:hover{background:var(--primary-alpha-08);color:var(--primary)}
.slot.sel{background:var(--primary-alpha-15);color:var(--primary);font-weight:600}
.ptile{height:90px;background:var(--surface-low);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:background .15s;border:none;position:relative}
.ptile:hover{background:var(--primary-alpha-08)}
.ptile.sel{background:var(--primary-alpha-12);animation:bounce .2s ease}
.ptile.sel::after{content:'';position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:8px;background:var(--primary)}
.ptile.sel::before{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;color:var(--on-primary);font-weight:800;z-index:1;line-height:16px}
.ptile-none{border-style:dashed}
.ptile .info-btn{position:absolute;bottom:4px;right:4px;width:18px;height:18px;border-radius:9px;background:var(--ghost-border-04);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.ptile:hover .info-btn{opacity:1}
.nrow{display:flex;gap:14px;padding:14px 10px;border-bottom:none;cursor:pointer;transition:all .15s;border-radius:8px;margin-bottom:4px}.nrow:hover{background:var(--surface-low)}
.prow{display:flex;align-items:center;gap:16px;padding:16px 10px;border-bottom:none;cursor:pointer;transition:all .15s;border-radius:8px;margin-bottom:4px}.prow:hover{background:var(--surface-low)}
.bcard{border:none;border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:all .15s;background:var(--surface-card);box-shadow:var(--shadow-card)}.bcard:hover{box-shadow:var(--shadow-card-hover)}
.upload-hero{height:180px;background:var(--hero-gradient);border-radius:16px;margin-bottom:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.upload-hero:hover{transform:scale(1.02);box-shadow:0 4px 24px var(--primary-alpha-25)}
.trend{height:140px;background:var(--surface-card);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .15s;border:none;box-shadow:var(--shadow-card)}.trend:hover{box-shadow:var(--shadow-card-hover)}
.cattab{flex:1;padding:12px 0;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;position:relative}
.cattab:hover{background:var(--primary-alpha-04)}.cattab.active{border-bottom-color:var(--primary)}
.ct{font-size:12px;color:var(--muted);transition:color .15s;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px}
.cattab.active .ct{color:var(--primary);font-weight:600}.cattab.active .ct svg{stroke:var(--primary)}
.sl{font-size:10px;color:var(--primary);font-weight:700;letter-spacing:.2em;margin-bottom:10px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.inf{height:44px;background:var(--surface-low);border:none;border-radius:10px;padding:0 16px;display:flex;align-items:center;font-size:13px;color:var(--on-surface-variant);transition:all .15s;cursor:pointer}.inf:hover{background:var(--surface-container)}
.real-input{height:48px;background:var(--input-bg);border:none;border-radius:12px;padding:0 16px;font-size:14px;color:var(--on-surface);font-family:'Manrope',sans-serif;outline:none;width:100%;transition:all .15s}
.real-input:focus{box-shadow:0 0 0 2px var(--primary-alpha-20);background:var(--surface-card)}
.cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--primary-alpha-06);border:none}
.build-tag{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:500;background:var(--tag-bg);border:none;color:var(--tag-color);display:inline-flex;align-items:center;gap:4px}
.sel-dot{width:5px;height:5px;border-radius:3px;background:var(--primary);position:absolute;top:5px;right:calc(50% - 16px)}
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--btn-primary-text);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;animation:toastIn .3s ease;z-index:100;white-space:nowrap;pointer-events:none}
.step-bar{display:flex;align-items:center;padding:8px 16px;flex-shrink:0;gap:4px;max-width:700px;margin:0 auto;width:100%}
.step{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;padding:8px 0;flex:1;text-align:center;border-radius:100px;background:var(--surface-low);transition:all .2s}
.step.active{color:var(--primary);background:var(--primary-alpha-10)}.step.done{color:var(--success);background:var(--success-alpha-10)}
.step-line{flex:0 0 8px;height:0;border:none}
.car-img{width:100%;height:100%;object-fit:cover}
.before-after{position:relative;overflow:hidden;background:var(--surface-low);cursor:col-resize;user-select:none;border-radius:16px;margin:0 16px}
.ba-img{width:100%;height:auto;display:block}
.ba-overlay{position:absolute;top:0;left:0;height:100%;overflow:hidden}.ba-overlay img{position:absolute;top:0;left:0;height:100%;object-fit:cover}

/* === SIDEBAR STYLES === */
.sidebar{display:none;width:240px;flex-shrink:0;height:100dvh;background:var(--topbar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:var(--divider);flex-direction:column;padding:24px 16px;position:sticky;top:0;z-index:50;overflow-y:auto}

.content-container{width:100%;max-width:1200px;margin:0 auto;padding:0 24px}

/* === RESPONSIVE LAYOUT (Tablet 768px+) === */
@media(min-width:768px){

  .feed-grid{display:grid!important;grid-template-columns:repeat(2,1fr)!important;gap:20px!important}

  .explore-categories{grid-template-columns:repeat(4,1fr)!important}
  .explore-results{display:grid!important;grid-template-columns:repeat(2,1fr)!important;gap:16px!important}

  .cust-product-grid{grid-template-columns:repeat(3,1fr)!important}

  .quote-layout{display:flex!important;gap:32px!important;flex-direction:row!important}
  .quote-visual{flex:0 0 55%;position:sticky;top:0;align-self:flex-start}
  .quote-details{flex:1}

  /* Book shops side-by-side */
  .book-layout{display:flex!important;flex-direction:row!important}
  .book-map{flex:0 0 45%;position:sticky;top:0;height:calc(100dvh - 60px)}
  .book-list{flex:1;overflow-y:auto}

  /* Profile */
  .profile-header{display:flex!important;align-items:center!important;gap:24px!important;flex-direction:row!important}
  .profile-builds-grid{grid-template-columns:repeat(4,1fr)!important}

  /* Splash/onboarding */
  .splash-content{display:flex!important;align-items:center!important;gap:48px!important;flex-direction:row!important;text-align:left!important}
  .splash-content .sp-h1{text-align:left}
  .splash-content .sp-sub{text-align:left}
  .sp-preview{flex:0 0 45%;margin-top:0!important}
  .onboard-card{max-width:560px;margin:0 auto}

  /* Post detail two-column */
  .post-detail-layout{display:flex!important;gap:32px!important}
  .post-detail-image{flex:0 0 50%;position:sticky;top:0;align-self:flex-start}
  .post-detail-content{flex:1}

  .feed-card{border-radius:18px}
  .shop-card{border-radius:18px}
  .modal{max-width:560px}
  .chip{height:38px;font-size:13px}
  .btn{width:auto;min-width:200px}
  .ptile{min-height:100px}

  /* Notifications & garage grid */
  .notif-list{max-width:640px;margin:0 auto}
  .garage-grid{display:grid!important;grid-template-columns:repeat(2,1fr)!important;gap:16px!important}
}

  .cust-top{flex:0 0 50%}
  .cust-product-grid{grid-template-columns:repeat(4,1fr)!important}
  .profile-builds-grid{grid-template-columns:repeat(5,1fr)!important}
  .garage-grid{grid-template-columns:repeat(3,1fr)!important}
}

/* === P3: CSS containment for scroll containers === */
.scroll{contain:content}

/* === P3: Directional slide animations === */
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.anim-forward{animation:slideInRight .2s ease;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.anim-back{animation:slideInLeft .2s ease;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* === P3: Breadcrumb for explore sub-sections === */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:8px 20px;font-size:11px;color:var(--muted);border-bottom:var(--divider)}
.breadcrumb a{color:var(--primary);cursor:pointer;text-decoration:none;font-weight:500}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb-sep{color:var(--outline)}

/* === P2: Reusable card classes to reduce inline styles === */
.card-base{background:var(--surface-card);border:none;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-card);transition:all .15s;cursor:pointer}
.card-base:hover{box-shadow:var(--shadow-card-hover)}
.card-thumb{width:64px;height:64px;border-radius:10px;overflow:hidden;background:var(--surface-low);flex-shrink:0;border:none}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb-lg{width:72px;height:72px;border-radius:10px;overflow:hidden;background:var(--surface-low);flex-shrink:0;border:none}
.card-thumb-lg img{width:100%;height:100%;object-fit:cover}

/* === P2: Accessibility helpers === */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
[role="alert"]{pointer-events:none}

/* === P3: Collapsible sidebar for tablet === */
@media(min-width:768px) and (max-width:1023px){
  .sidebar{width:72px;padding:16px 8px;align-items:center}
  .sidebar-logo{font-size:0;padding:0;margin-bottom:24px}
  .sidebar-logo::first-letter{font-size:20px}
  .sidebar-item{padding:12px;justify-content:center;font-size:0;gap:0;border-radius:14px}
  .sidebar-item svg{margin:0}
  .sidebar-upload{padding:14px;font-size:0;gap:0;justify-content:center}
  .sidebar-bottom .sidebar-item{font-size:0;gap:0;justify-content:center}
}
@media(min-width:1024px){
  .sidebar{width:240px}
}

function downloadPDF(){
  var items=quoteItems();var lo=0,hi=0;items.forEach(function(x){lo+=x.lo;hi+=x.hi});
  // Build raw PDF
  var vn=vehicleName();var vd=vehicleDesc();var dt=new Date().toLocaleDateString();
  var lines=[];var y=750;
  // PDF text helper
  function addText(x,yp,size,text,color){lines.push({x:x,y:yp,s:size,t:text,c:color||'0 0 0'})}
  // Header
  addText(40,y,22,'AVACAR','0 0.353 0.718');y-=12;
  addText(40,y,10,'Quote Estimate','0.5 0.5 0.5');y-=25;
  addText(40,y,8,'Generated: '+dt,'0.4 0.4 0.4');y-=25;
  // Vehicle
  addText(40,y,16,vn,'0.1 0.1 0.1');y-=16;
  addText(40,y,10,vd,'0.4 0.4 0.4');y-=30;
  // Separator
  addText(40,y,8,'────────────────────────────────────────────────────────','0.8 0.8 0.8');y-=20;
  addText(40,y,9,'ESTIMATED PRICING','0 0.353 0.718');y-=20;
  // Items
  items.forEach(function(r){
    addText(40,y,11,r.i,'0.2 0.2 0.2');
    addText(400,y,11,'$'+r.lo.toLocaleString()+' - $'+r.hi.toLocaleString(),'0.1 0.1 0.1');
    y-=8;
    addText(40,y,6,'─────────────────────────────────────────────────────────────','0.9 0.9 0.9');
    y-=16;
  });
  y-=10;
  // Total
  addText(40,y,11,'Total Estimate','0.4 0.4 0.4');
  addText(400,y,14,'$'+lo.toLocaleString()+' - $'+hi.toLocaleString(),'0 0.353 0.718');
  y-=40;
  // Build summary
  addText(40,y,8,'Build: '+buildSummary(),'0.5 0.5 0.5');y-=15;
  // Footer
  addText(40,60,7,'Prices are estimates. A certified shop will provide your final quote.','0.6 0.6 0.6');
  addText(40,48,7,'Generated by AVACAR - avacar.com','0.6 0.6 0.6');
  // Generate PDF
  var objs=[];var xref=[];
  function obj(content){var n=objs.length+1;objs.push(content);return n}
  var catalogRef=obj('<< /Type /Catalog /Pages 2 0 R >>');
  var pagesRef=obj('');
  var fontRef=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  var fontBRef=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  // Build content stream
  var stream='';
  // Accent bar
  stream+='0 0.353 0.718 rg\n40 770 515 30 re f\n';
  stream+='1 1 1 rg\nBT /F2 18 Tf 50 778 Td (AVACAR) Tj ET\n';
  stream+='BT /F1 9 Tf 440 778 Td (Quote Estimate) Tj ET\n';
  // White background below
  stream+='1 1 1 rg\n0 0 595 770 re f\n';
  lines.forEach(function(l){
    var fn=l.s>12?'/F2':'/F1';
    var escaped=l.t.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
    stream+=''+l.c+' rg\nBT '+fn+' '+l.s+' Tf '+l.x+' '+l.y+' Td ('+escaped+') Tj ET\n';
  });
  var streamRef=obj('');
  var pageRef=obj('');
  // Update objects
  objs[1]='<< /Type /Pages /Kids ['+pageRef+' 0 R] /Count 1 >>';
  objs[streamRef-1]='<< /Length '+stream.length+' >>\nstream\n'+stream+'endstream';
  objs[pageRef-1]='<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Contents '+streamRef+' 0 R /Resources << /Font << /F1 '+fontRef+' 0 R /F2 '+fontBRef+' 0 R >> >> >>';
  // Assemble PDF
  var pdf='%PDF-1.4\n';
  objs.forEach(function(content,i){
    xref.push(pdf.length);
    pdf+=(i+1)+' 0 obj\n'+content+'\nendobj\n';
  });
  var xrefPos=pdf.length;
  pdf+='xref\n0 '+(objs.length+1)+'\n0000000000 65535 f \n';
  xref.forEach(function(pos){pdf+=(('0000000000'+pos).slice(-10))+' 00000 n \n'});
  pdf+='trailer\n<< /Size '+(objs.length+1)+' /Root 1 0 R >>\nstartxref\n'+xrefPos+'\n%%EOF';
  // Download
  var blob=new Blob([pdf],{type:'application/pdf'});
  var link=document.createElement('a');
  link.download='avacar-quote-'+vn.replace(/\s+/g,'-').toLowerCase()+'.pdf';
  link.href=URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('PDF downloaded!');
}

async function identifyCar(photoData){
  var done=false;
  var timeout=setTimeout(function(){
    if(!done){done=true;vehicle.make='BMW';vehicle.model='M4 Competition';vehicle.year='2024';vehicle.color='Alpine White';vehicle.body='Coupe';go('confirm')}
  },2500);
  if(!userApiKey){clearTimeout(timeout);setTimeout(function(){vehicle.make='BMW';vehicle.model='M4 Competition';vehicle.year='2024';vehicle.color='Alpine White';vehicle.body='Coupe';go('confirm')},1500);return}
  try{
    var mediaType='image/jpeg';
    if(photoData.indexOf('data:image/png')===0)mediaType='image/png';
    else if(photoData.indexOf('data:image/webp')===0)mediaType='image/webp';
    var b64=photoData.split(',')[1];
    if(!b64||b64.length<100){throw new Error('Invalid image')}
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','anthropic-version':'2023-06-01','x-api-key':userApiKey},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
          {type:'text',text:'Identify this vehicle. Respond with ONLY a raw JSON object, no markdown, no backticks, no extra text. Format: {"make":"Toyota","model":"Camry","year":"2022","color":"White","body":"Sedan"} Body must be one of: Sedan, Coupe, SUV, Truck, Hatchback, Convertible, Van, Wagon, Crossover. Always provide your best estimate.'}
        ]}]
      })
    });
    clearTimeout(timeout);if(done)return;
    if(!resp.ok){throw new Error('API '+resp.status)}
    var data=await resp.json();
    if(!data.content||!data.content[0]){throw new Error('No content')}
    var rawText=data.content[0].text.trim().replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var parsed=JSON.parse(rawText);
    vehicle.make=parsed.make||'';
    vehicle.model=parsed.model||'';
    vehicle.year=parsed.year||'';
    vehicle.color=parsed.color||'';
    vehicle.body=parsed.body||'Sedan';
    if(!done){done=true;go('confirm')}
  }catch(e){
    clearTimeout(timeout);
    console.error('Car ID:',e);
    if(!done){done=true;vehicle.make='BMW';vehicle.model='M4 Competition';vehicle.year='2024';vehicle.color='Alpine White';vehicle.body='Coupe';go('confirm')}
  }
}

ondary" style="width:100%" onclick="bk()">'+ic('download',14)+' Download Image</button><button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="generateShareCard()">'+ic('image',14)+' Generate Share Card</button></div></div>'},

booking_history:function(){return TB('Bookings',{back:true,home:true})+'<div class="scroll" style="padding:20px">'+[{n:'Elite Wraps Co.',s:'Upcoming',sc:'var(--primary)',sb:'var(--primary-alpha-10)',sbc:'var(--primary-alpha-20)',d:'Mar 10, 2026'},{n:'Premium Detail Lab',s:'Completed',sc:'var(--success)',sb:'var(--success-alpha-10)',sbc:'var(--success-alpha-20)',d:'Jan 15, 2026'}].map(function(b){return '<div style="background:var(--surface-low);border:1px solid var(--ghost-border);border-radius:12px;padding:14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:14px;font-weight:600;color:var(--on-surface)">'+b.n+'</div><div style="padding:3px 8px;border-radius:10px;background:'+b.sb+';border:1px solid '+b.sbc+';font-size:10px;color:'+b.sc+'">'+b.s+'</div></div><div style="font-size:12px;color:var(--muted)">'+b.d+'</div></div>'}).join('')+'</div>'},

notif_settings:function(){return TB('Notifications',{back:true,home:true})+'<div class="scroll" style="padding:20px"><div class="notif-list">'+['Booking confirmations','Shop responses','Render completed','Promotions'].map(function(n){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:var(--divider)"><div style="font-size:14px;color:var(--on-surface)">'+n+'</div><div style="width:44px;height:24px;border-radius:12px;background:var(--primary);position:relative;cursor:pointer"><div style="width:20px;height:20px;border-radius:10px;background:var(--surface-card);position:absolute;top:2px;right:2px"></div></div></div>'}).join('')+'</div></div>'},

help:function(){return TB('Help & Support',{back:true,home:true})+'<div class="scroll" style="padding:20px">'+['How does AI rendering work?','What is a certified shop?','How are prices estimated?','Can I cancel a booking?','Contact support'].map(function(q){return '<div class="prow"><div style="flex:1;font-size:14px;color:var(--on-surface)">'+q+'</div><span style="color:var(--outline-variant)">'+ic('chevron-right',16)+'</span></div>'}).join('')+'</div>'}

// Garage helpers
function saveToGarage(){
  var exists=garage.find(function(g){return g.name===vehicleName()});
  if(!exists){garage.push({name:vehicleName(),desc:vehicleDesc(),photo:carPhoto})}
}
function switchVehicle(idx){
  var g=garage[idx];if(!g)return;
  vehicle.make=g.name.split(' ').slice(1,-1).join(' ')||g.name;
  carPhoto=g.photo;
}

ren(true);
</script>
